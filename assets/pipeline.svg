<svg xmlns="http://www.w3.org/2000/svg" width="800" height="220" viewBox="0 0 800 220">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="box1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="100%" style="stop-color:#1f6feb"/>
    </linearGradient>
    <linearGradient id="box2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7ee787"/>
      <stop offset="100%" style="stop-color:#3fb950"/>
    </linearGradient>
    <linearGradient id="box3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d2a8ff"/>
      <stop offset="100%" style="stop-color:#a371f7"/>
    </linearGradient>
    <linearGradient id="box4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffa657"/>
      <stop offset="100%" style="stop-color:#d29922"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="220" fill="url(#bg)" rx="12"/>

  <!-- Stage 1: Prompts -->
  <rect x="30" y="45" width="150" height="60" rx="10" fill="url(#box1)" opacity="0.15" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="105" y="70" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#58a6ff" font-weight="600">PROMPT LOADER</text>
  <text x="105" y="88" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#8b949e">L1 + L2 + L3</text>

  <!-- Arrow 1 -->
  <line x1="185" y1="75" x2="225" y2="75" stroke="#58a6ff" stroke-width="1.5" opacity="0.5" stroke-dasharray="4,4">
    <animate attributeName="stroke-dashoffset" values="8;0" dur="1s" repeatCount="indefinite"/>
  </line>
  <polygon points="225,70 235,75 225,80" fill="#58a6ff" opacity="0.7">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
  </polygon>

  <!-- Stage 2: Generate -->
  <rect x="240" y="45" width="150" height="60" rx="10" fill="url(#box2)" opacity="0.15" stroke="#7ee787" stroke-width="1.5"/>
  <text x="315" y="70" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#7ee787" font-weight="600">GENERATE / EDIT</text>
  <text x="315" y="88" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#8b949e">9 models, async</text>

  <!-- Arrow 2 -->
  <line x1="395" y1="75" x2="435" y2="75" stroke="#7ee787" stroke-width="1.5" opacity="0.5" stroke-dasharray="4,4">
    <animate attributeName="stroke-dashoffset" values="8;0" dur="1s" repeatCount="indefinite"/>
  </line>
  <polygon points="435,70 445,75 435,80" fill="#7ee787" opacity="0.7">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" begin="0.5s" repeatCount="indefinite"/>
  </polygon>

  <!-- Stage 3: Judge -->
  <rect x="450" y="45" width="150" height="60" rx="10" fill="url(#box3)" opacity="0.15" stroke="#d2a8ff" stroke-width="1.5"/>
  <text x="525" y="70" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#d2a8ff" font-weight="600">MLLM JUDGE</text>
  <text x="525" y="88" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#8b949e">Soft-TIFA logprobs</text>

  <!-- Arrow 3 -->
  <line x1="605" y1="75" x2="645" y2="75" stroke="#d2a8ff" stroke-width="1.5" opacity="0.5" stroke-dasharray="4,4">
    <animate attributeName="stroke-dashoffset" values="8;0" dur="1s" repeatCount="indefinite"/>
  </line>
  <polygon points="645,70 655,75 645,80" fill="#d2a8ff" opacity="0.7">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" begin="1s" repeatCount="indefinite"/>
  </polygon>

  <!-- Stage 4: Aggregate -->
  <rect x="660" y="45" width="110" height="60" rx="10" fill="url(#box4)" opacity="0.15" stroke="#ffa657" stroke-width="1.5"/>
  <text x="715" y="70" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#ffa657" font-weight="600">AGGREGATE</text>
  <text x="715" y="88" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#8b949e">AM + GM scores</text>

  <!-- Data flow pulse -->
  <circle cx="30" cy="75" r="3" fill="#58a6ff" opacity="0" filter="url(#glow)">
    <animate attributeName="cx" values="30;185;240;395;450;605;660;770" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="fill" values="#58a6ff;#58a6ff;#7ee787;#7ee787;#d2a8ff;#d2a8ff;#ffa657;#ffa657" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.8;0.8;0.8;0.8;0.8;0.8;0" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- Bottom labels -->
  <text x="105" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#484f58">250 T2I prompts</text>
  <text x="105" y="153" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#484f58">250 Edit prompts</text>

  <text x="315" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#484f58">5 T2I generators</text>
  <text x="315" y="153" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#484f58">4 Image editors</text>

  <text x="525" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#484f58">GPT-4o / Qwen3.5</text>
  <text x="525" y="153" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#484f58">P(Yes) extraction</text>

  <text x="715" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#484f58">Leaderboards</text>
  <text x="715" y="153" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#484f58">PDF reports</text>

  <!-- Decorative bottom border -->
  <rect x="30" y="185" width="740" height="1" rx="0.5" fill="#30363d"/>
  <rect x="30" y="185" width="0" height="1" rx="0.5" fill="url(#box1)">
    <animate attributeName="width" values="0;740" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="fill" values="#58a6ff;#7ee787;#d2a8ff;#ffa657" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Footer text -->
  <text x="400" y="205" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#484f58" letter-spacing="2">FULLY AUTOMATED  ·  RESUME-FRIENDLY  ·  COST-CAPPED</text>
</svg>
